<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dune Query Intent Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060a0f; font-family: 'Courier New', monospace; overflow: hidden; }
  #title { position: fixed; top: 20px; left: 24px; z-index: 10; }
  #title h1 { font-size: 11px; color: #3d5166; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 4px; }
  #title p { font-size: 9px; color: #1e2d3d; }
  #legend { position: fixed; top: 20px; right: 24px; z-index: 10; display: flex; flex-direction: column; gap: 7px; }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .legend-label { font-size: 9px; color: #4a6070; }
  #panel { position: fixed; bottom: 24px; left: 24px; z-index: 10; background: #0a0f16; border: 1px solid #1a2530; padding: 16px 20px; max-width: 340px; display: none; }
  #panel .pid { font-size: 10px; letter-spacing: 2px; margin-bottom: 8px; }
  #panel .genre-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  #panel .arrow { font-size: 9px; color: #1e2d3d; }
  #panel .genre-text { font-size: 10px; }
  #tooltip { position: fixed; pointer-events: none; background: #0a0f16; border: 1px solid #1a2530; padding: 8px 12px; font-size: 9px; color: #8899aa; display: none; z-index: 20; }
  svg { display: block; }
  .genre-node circle { transition: r 0.2s; }
  .genre-node:hover circle { r: 36; }
  .query-node rect { transition: opacity 0.2s; }
  .query-node:hover rect { opacity: 0.9; }
</style>
</head>
<body>

<div id="title">
  <h1>Dune Query Intent Map</h1>
  <p>n=17 queries &nbsp;·&nbsp; drag to explore &nbsp;·&nbsp; click to inspect</p>
</div>

<div id="legend"></div>
<div id="panel">
  <div class="pid" id="panel-id"></div>
  <div id="panel-genres"></div>
</div>
<div id="tooltip"></div>

<script>
const queries = [
  { id:"q44",  label:"fffiiinnneee",    short:"DEX PnL",        top:"DeFi",          genres:["DeFi / On-chain","DEX Trading","Wallet Analysis","PnL Tracking"] },
  { id:"q49",  label:"test query",      short:"Bot Profit",     top:"Protocol Ops",  genres:["Protocol Ops","Cost Accounting","Multi-env","Gas vs Earnings"] },
  { id:"q55",  label:"2690055",         short:"BPT Supply",     top:"Token Econ",    genres:["Token Economics","Supply Tracking","ERC-20","Circ Supply"] },
  { id:"q43",  label:"LZ 900K",         short:"LZ Leaderboard", top:"Cross-chain",   genres:["Cross-chain","User Profiling","Airdrop Farming","Activity Scoring"] },
  { id:"q60",  label:"insh",            short:"Bot Detection",  top:"DeFi",          genres:["DeFi / On-chain","Wallet Surveillance","DEX Flow","Bot Detection"] },
  { id:"q63",  label:"Exchange Flows",  short:"CEX Flows",      top:"Market",        genres:["Market Structure","CEX Monitoring","Token Flows","Net Flow"] },
  { id:"q70",  label:"nihonden",        short:"LZ Clone",       top:"Cross-chain",   genres:["Cross-chain","User Profiling","Airdrop Farming","Activity Scoring"] },
  { id:"q76",  label:"2690076",         short:"BAL Supply",     top:"Token Econ",    genres:["Token Economics","Supply Tracking","Gov Token","Total Supply"] },
  { id:"q81",  label:"Univ3 LPs",       short:"V3 Pool (WIP)",  top:"DeFi",          genres:["DeFi / On-chain","AMM","LP Analysis","Price+TVL"] },
  { id:"q82",  label:"Notional Liq",    short:"Liquidations",   top:"DeFi",          genres:["DeFi / On-chain","Lending","Risk Monitor","Liq Events"] },
  { id:"q85",  label:"DAU/PAU",         short:"Network DAU",    top:"Network",       genres:["Network Metrics","User Activity","Ethereum","Active Addresses"] },
  { id:"q84",  label:"2690084",         short:"veBAL Power",    top:"DeFi",          genres:["DeFi / On-chain","Governance","veBAL","Vote Power"] },
  { id:"q88",  label:"CAI Benchmark",   short:"Price Perf",     top:"Token Econ",    genres:["Token Economics","Price Benchmark","Multi-token","Rolling Returns"] },
  { id:"q90",  label:"LZ Stats",        short:"LZ Wallet",      top:"Cross-chain",   genres:["Cross-chain","Single Wallet","LayerZero","Activity Scoring"] },
  { id:"q93",  label:"LZ Forks ×3",     short:"LZ Forks ×3",   top:"Cross-chain",   genres:["Cross-chain","User Profiling","Airdrop Farming","Activity Scoring"] },
  { id:"q96",  label:"Lido Runway",     short:"DAO Runway",     top:"DAO Finance",   genres:["DAO Finance","Risk Monitor","Treasury","Runway Calc"] },
  { id:"q119", label:"2690119",         short:"Treasury Bal",   top:"DAO Finance",   genres:["DAO Finance","Multi-token","Treasury","Balance+USD"] },
];

const palette = {
  "DeFi":         "#00ff88",
  "Cross-chain":  "#ff6b35",
  "Token Econ":   "#a78bfa",
  "DAO Finance":  "#38bdf8",
  "Protocol Ops": "#fbbf24",
  "Network":      "#fb7185",
  "Market":       "#34d399",
};

// Legend
const legend = document.getElementById("legend");
Object.entries(palette).forEach(([k, v]) => {
  const item = document.createElement("div");
  item.className = "legend-item";
  item.innerHTML = `<div class="legend-dot" style="background:${v};box-shadow:0 0 6px ${v}88"></div><span class="legend-label">${k}</span>`;
  legend.appendChild(item);
});

const W = window.innerWidth, H = window.innerHeight;

// Collect all unique genres
const genreSet = new Set();
queries.forEach(q => q.genres.forEach(g => genreSet.add(g)));

const nodes = [
  ...queries.map(q => ({ id: q.id, type: "query", label: q.short, query: q, top: q.top })),
  ...[...genreSet].map(g => ({ id: `g_${g}`, type: "genre", label: g })),
];

const links = [];
queries.forEach(q => {
  q.genres.forEach(g => {
    links.push({ source: q.id, target: `g_${g}` });
  });
});

const svg = d3.select("body").append("svg").attr("width", W).attr("height", H);

const defs = svg.append("defs");
const filter = defs.append("filter").attr("id", "glow");
filter.append("feGaussianBlur").attr("stdDeviation", "3").attr("result", "coloredBlur");
const feMerge = filter.append("feMerge");
feMerge.append("feMergeNode").attr("in", "coloredBlur");
feMerge.append("feMergeNode").attr("in", "SourceGraphic");

// scanline
const pat = defs.append("pattern").attr("id","scan").attr("width",1).attr("height",3).attr("patternUnits","userSpaceOnUse");
pat.append("rect").attr("width",1).attr("height",1).attr("y",0).attr("fill","rgba(255,255,255,0.012)");
svg.append("rect").attr("width",W).attr("height",H).attr("fill","url(#scan)").style("pointer-events","none");

// grid
const gridG = svg.append("g").style("pointer-events","none");
for(let x=0;x<W;x+=60) gridG.append("line").attr("x1",x).attr("y1",0).attr("x2",x).attr("y2",H).attr("stroke","#0d1520").attr("stroke-width",0.5);
for(let y=0;y<H;y+=60) gridG.append("line").attr("x1",0).attr("y1",y).attr("x2",W).attr("y2",y).attr("stroke","#0d1520").attr("stroke-width",0.5);

const sim = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d => d.id).distance(d => 95).strength(0.5))
  .force("charge", d3.forceManyBody().strength(d => d.type === "genre" ? -320 : -150))
  .force("center", d3.forceCenter(W / 2, H / 2))
  .force("collision", d3.forceCollide(d => d.type === "genre" ? 42 : 30));

const linkG = svg.append("g");
const nodeG = svg.append("g");

const link = linkG.selectAll("line").data(links).join("line")
  .attr("stroke", d => {
    const src = nodes.find(n => n.id === (typeof d.source === "object" ? d.source.id : d.source));
    const col = src ? (palette[src.top] || "#334") : "#334";
    return col;
  })
  .attr("stroke-opacity", 0.15)
  .attr("stroke-width", 1);

const nodeEl = nodeG.selectAll("g").data(nodes).join("g")
  .attr("class", d => d.type === "genre" ? "genre-node" : "query-node")
  .attr("cursor", "pointer");

// Genre circles
nodeEl.filter(d => d.type === "genre").append("circle")
  .attr("r", 32)
  .attr("fill", d => {
    const match = Object.keys(palette).find(k => d.label.toLowerCase().includes(k.toLowerCase().split(" ")[0]));
    return match ? palette[match] + "14" : "#ffffff08";
  })
  .attr("stroke", d => {
    const match = Object.keys(palette).find(k => d.label.toLowerCase().includes(k.toLowerCase().split(" ")[0]));
    return match ? palette[match] + "50" : "#1e3040";
  })
  .attr("stroke-width", 1);

nodeEl.filter(d => d.type === "genre").append("text")
  .text(d => d.label)
  .attr("text-anchor","middle").attr("dy","0.35em")
  .attr("fill","#3d5570").attr("font-size","8.5px").attr("font-family","monospace")
  .style("pointer-events","none");

// Query rects
nodeEl.filter(d => d.type === "query").append("rect")
  .attr("x",-38).attr("y",-14).attr("width",76).attr("height",28).attr("rx",3)
  .attr("fill", d => (palette[d.top] || "#fff") + "16")
  .attr("stroke", d => (palette[d.top] || "#fff") + "60")
  .attr("stroke-width", 1)
  .style("filter","url(#glow)");

nodeEl.filter(d => d.type === "query").append("text")
  .text(d => d.label)
  .attr("text-anchor","middle").attr("dy","0.35em")
  .attr("fill", d => palette[d.top] || "#aabbcc")
  .attr("font-size","8.5px").attr("font-family","monospace").attr("font-weight","700")
  .style("pointer-events","none");

// Interaction
let selected = null;
const panel = document.getElementById("panel");
const panelId = document.getElementById("panel-id");
const panelGenres = document.getElementById("panel-genres");
const tooltip = document.getElementById("tooltip");

nodeEl.on("click", function(event, d) {
  event.stopPropagation();
  if (selected === d.id) {
    selected = null;
    panel.style.display = "none";
    nodeEl.selectAll("rect,circle").attr("opacity", 1);
    link.attr("stroke-opacity", 0.15);
    return;
  }
  selected = d.id;

  // Highlight connected
  const connected = new Set([d.id]);
  links.forEach(l => {
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });

  nodeEl.selectAll("rect,circle").attr("opacity", n => connected.has(n.id) ? 1 : 0.15);
  link.attr("stroke-opacity", l => {
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    return (sid === d.id || tid === d.id) ? 0.7 : 0.03;
  });

  // Panel
  if (d.type === "query") {
    const q = d.query;
    const col = palette[d.top] || "#aabbcc";
    panel.style.borderColor = col + "44";
    panel.style.boxShadow = `0 0 30px ${col}18`;
    panelId.style.color = col;
    panelId.textContent = `${q.id.replace("q","269")} — ${q.label}`;
    panelGenres.innerHTML = q.genres.map((g, i) =>
      `<div class="genre-row">
        <span class="arrow">${"▸".repeat(i+1)}</span>
        <span class="genre-text" style="color:${i === q.genres.length-1 ? '#aabbcc' : '#3d5570'}">${g}</span>
      </div>`
    ).join("");
    panel.style.display = "block";
  } else {
    // Genre node: show which queries share it
    const shared = queries.filter(q => q.genres.includes(d.label));
    panel.style.borderColor = "#1a2530";
    panel.style.boxShadow = "none";
    panelId.style.color = "#4a6070";
    panelId.textContent = `GENRE: ${d.label}`;
    panelGenres.innerHTML = shared.map(q =>
      `<div class="genre-row">
        <span class="arrow" style="color:${palette[q.top]||'#aaa'}">▸</span>
        <span class="genre-text" style="color:${palette[q.top]||'#aaa'}">${q.label}</span>
      </div>`
    ).join("");
    panel.style.display = "block";
  }
});

svg.on("click", () => {
  selected = null;
  panel.style.display = "none";
  nodeEl.selectAll("rect,circle").attr("opacity", 1);
  link.attr("stroke-opacity", 0.15);
});

nodeEl.on("mouseover", function(event, d) {
  tooltip.style.display = "block";
  tooltip.textContent = d.type === "query" ? d.query.label : `${d.label} — shared by ${queries.filter(q=>q.genres.includes(d.label)).length} queries`;
})
.on("mousemove", function(event) {
  tooltip.style.left = (event.clientX + 14) + "px";
  tooltip.style.top = (event.clientY - 10) + "px";
})
.on("mouseout", () => tooltip.style.display = "none");

nodeEl.call(d3.drag()
  .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
  .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
  .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
);

sim.on("tick", () => {
  link
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  nodeEl.attr("transform", d => `translate(${d.x},${d.y})`);
});

window.addEventListener("resize", () => {
  const w = window.innerWidth, h = window.innerHeight;
  svg.attr("width", w).attr("height", h);
  sim.force("center", d3.forceCenter(w/2, h/2)).alpha(0.3).restart();
});
</script>
</body>
</html>
