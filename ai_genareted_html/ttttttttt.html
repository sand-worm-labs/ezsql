<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Icicle</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f0f2f5; font-family:'Courier New',monospace; overflow:hidden; height:100vh; }
#header {
  height:48px; background:#fff; border-bottom:2px solid #e0e4ec;
  display:flex; align-items:center; padding:0 20px; gap:8px;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}
#header h1 { font-size:11px; font-weight:900; letter-spacing:4px; color:#1a2030; margin-right:12px; }
.bc { font-size:9px; font-weight:800; letter-spacing:1px; padding:5px 12px;
  border:2px solid #e0e4ec; color:#8899aa; cursor:pointer; background:#f8f9fc;
  border-radius:4px; white-space:nowrap; }
.bc:hover { color:#1a2030; border-color:#c0c8d8; }
.bc.active { color:#fff; background:#1a2030; border-color:#1a2030; }
.bc-arrow { color:#c0c8d8; font-size:14px; }
#hint { position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
  font-size:9px; color:#b0b8c8; letter-spacing:2px; font-weight:700; pointer-events:none; }
#tooltip {
  position:fixed; pointer-events:none; z-index:200; background:#fff;
  border:2px solid #e0e4ec; border-radius:6px; padding:12px 16px;
  font-size:10px; color:#334466; display:none; max-width:280px;
  line-height:2; box-shadow:0 8px 32px rgba(0,0,0,0.12);
}
.tt-title { font-size:12px; color:#1a2030; font-weight:900; margin-bottom:4px; }
#canvas { position:fixed; top:48px; left:0; right:0; bottom:0; }
</style>
</head>
<body>
<div id="header">
  <h1>ICICLE</h1>
  <div id="bc"></div>
</div>
<div id="canvas"></div>
<div id="tooltip"><div class="tt-title" id="tt-t"></div><div id="tt-b"></div></div>
<div id="hint">click to zoom in · click root bar to zoom out</div>
<script>
const Q = [
  {id:"q44",  label:"fffiiinnneee",   g1:"DeFi",            g2:"On-chain Activity",      g3:"DEX Trading",            g4:"PnL Tracking",        g5:"Single-wallet DEX trade history"},
  {id:"q49",  label:"test query",     g1:"Protocol Ops",    g2:"Cost Accounting",        g3:"Multi-env Comparison",   g4:"Gas vs Earnings",     g5:"Polygon bot daily net profit"},
  {id:"q55",  label:"2690055",        g1:"Token Economics", g2:"Supply Tracking",        g3:"ERC-20 Token",           g4:"Circulating Supply",  g5:"Balancer BPT circ supply"},
  {id:"q43",  label:"LZ 900K",        g1:"Cross-chain",     g2:"User Profiling",         g3:"Airdrop Farming",        g4:"Activity Scoring",    g5:"LayerZero per-wallet rank"},
  {id:"q60",  label:"insh",           g1:"DeFi",            g2:"Wallet Surveillance",    g3:"DEX Flow Analysis",      g4:"Bot Detection",       g5:"ETH DEX bot detection"},
  {id:"q63",  label:"Exchange Flows", g1:"Market Structure",g2:"CEX Monitoring",         g3:"Token Deposit/Withdraw", g4:"Net Flow by Exchange",g5:"PENDLE CEX flows"},
  {id:"q70",  label:"nihonden",       g1:"Cross-chain",     g2:"User Profiling",         g3:"Airdrop Farming",        g4:"Activity Scoring",    g5:"LZ leaderboard fork"},
  {id:"q76",  label:"2690076",        g1:"Token Economics", g2:"Supply Tracking",        g3:"Governance Token",       g4:"Total Supply",        g5:"BAL total supply"},
  {id:"q81",  label:"Univ3 LPs",      g1:"DeFi",            g2:"AMM / Liquidity",        g3:"Uniswap V3 Pool",        g4:"Price + TVL",         g5:"Polygon V3 pool price WIP"},
  {id:"q82",  label:"Notional Liq",   g1:"DeFi",            g2:"Lending / Credit",       g3:"Risk Monitoring",        g4:"Liquidation Events",  g5:"Notional v3 liquidations"},
  {id:"q85",  label:"DAU/PAU",        g1:"Network Metrics", g2:"User Activity",          g3:"Ethereum Mainnet",       g4:"Active Addresses",    g5:"Daily ETH senders + receivers"},
  {id:"q84",  label:"2690084",        g1:"DeFi",            g2:"Governance",             g3:"Vote-Escrowed Token",    g4:"veBAL Decay Model",   g5:"veBAL power timeseries"},
  {id:"q88",  label:"CAI Benchmark",  g1:"Token Economics", g2:"Price Benchmarking",     g3:"Multi-token Comparison", g4:"Rolling Returns",     g5:"CAI vs AVAX returns"},
  {id:"q90",  label:"LZ Stats",       g1:"Cross-chain",     g2:"Single Wallet Lookup",   g3:"LayerZero Protocol",     g4:"Activity Scoring",    g5:"Single-address LZ summary"},
  {id:"q93",  label:"LZ Forks x3",   g1:"Cross-chain",     g2:"User Profiling",         g3:"Airdrop Farming",        g4:"Activity Scoring",    g5:"3x LZ leaderboard forks"},
  {id:"q96",  label:"Lido Runway",    g1:"DAO Finance",     g2:"Operational Risk",       g3:"Treasury Management",   g4:"Runway Calculation",  g5:"Lido stablecoin runway"},
  {id:"q119", label:"2690119",        g1:"DAO Finance",     g2:"Portfolio Tracking",     g3:"Treasury Wallets",       g4:"Balance + USD Value", g5:"Balancer treasury balances"},
];

const PAL = {
  "DeFi":            "#00b85c",
  "Cross-chain":     "#e8500a",
  "Token Economics": "#7c3aed",
  "DAO Finance":     "#0284c7",
  "Protocol Ops":    "#d97706",
  "Network Metrics": "#e11d48",
  "Market Structure":"#059669",
};
const col = d => PAL[d] || "#334466";

function domainOf(node) {
  let n = node;
  while (n.depth > 1) n = n.parent;
  return n.depth === 0 ? null : n.data.name;
}

function getColor(node) {
  const dom = domainOf(node);
  if (!dom) return "#e0e4ec";
  const base = col(dom);
  // fade by relative depth
  const alphas = ["ff","dd","bb","99","77","55"];
  const rel = Math.min(node.depth, 5);
  return base + alphas[rel];
}

// tooltip
const TT = document.getElementById("tooltip");
const TTT = document.getElementById("tt-t");
const TTB = document.getElementById("tt-b");
function showTT(e, title, body) { TT.style.display="block"; TTT.textContent=title; TTB.innerHTML=body; moveTT(e); }
function moveTT(e) { TT.style.left=(e.clientX+16)+"px"; TT.style.top=(Math.min(e.clientY-10, window.innerHeight-120))+"px"; }
function hideTT() { TT.style.display="none"; }

// build hierarchy
function buildTree() {
  const root = { name:"All Queries", children:[] };
  Q.forEach(q => {
    const layers = [q.g1, q.g2, q.g3, q.g4, q.g5];
    let cur = root.children;
    layers.forEach((l, i) => {
      let node = cur.find(n => n.name === l);
      if (!node) { node = { name:l, domain:q.g1, children:[] }; cur.push(node); }
      if (i === 4) { node.value = 1; node.queryId = q.id; node.queryLabel = q.label; delete node.children; }
      cur = node.children || [];
    });
  });
  return root;
}

const canvasEl = document.getElementById("canvas");
const W = canvasEl.clientWidth;
const H = canvasEl.clientHeight;
const DEPTH = 6;          // root + 5 layers
const ROW = H / DEPTH;    // height per row

const hier = d3.hierarchy(buildTree())
  .sum(d => d.value || 0)
  .sort((a, b) => b.value - a.value);

// partition gives x0,x1 in [0,1] range (we'll use size [1,1] then scale)
d3.partition().size([1, 1])(hier);

const svg = d3.select("#canvas").append("svg").attr("width", W).attr("height", H);

// defs
const defs = svg.append("defs");
const shad = defs.append("filter").attr("id","shad");
shad.append("feDropShadow").attr("dx",0).attr("dy",2).attr("stdDeviation",3).attr("flood-color","rgba(0,0,0,0.10)");

const cellG = svg.append("g");

let current = hier; // currently zoomed node

function xPos(node, focus) {
  // map node.x0 from focus domain to [0, W]
  return (node.x0 - focus.x0) / (focus.x1 - focus.x0) * W;
}
function xWid(node, focus) {
  return (node.x1 - node.x0) / (focus.x1 - focus.x0) * W;
}
function yPos(node, focus) {
  return (node.depth - focus.depth) * ROW;
}

function zoom(focus) {
  current = focus;
  updateBC(focus);

  const tr = d3.transition().duration(500).ease(d3.easeCubicInOut);

  // all descendants of focus (including focus itself), up to DEPTH levels deep
  const nodes = focus.descendants().filter(d => d.depth - focus.depth < DEPTH);

  const cells = cellG.selectAll("g.cell")
    .data(nodes, d => d.data.name + "~" + d.depth);

  const enter = cells.enter().append("g").attr("class","cell").attr("opacity",0);
  enter.append("rect");
  enter.append("text");
  enter.transition(tr).attr("opacity",1);

  cells.exit().transition(tr).attr("opacity",0).remove();

  const merged = enter.merge(cells);

  // RECTS
  merged.select("rect")
    .attr("cursor", d => d.children ? "pointer" : "default")
    .on("click", function(event, d) {
      event.stopPropagation();
      if (d === current && d.parent) zoom(d.parent);
      else if (d.children) zoom(d);
    })
    .on("mouseover", function(event, d) {
      d3.select(this).attr("opacity", 0.75);
      const dom = domainOf(d) || "Root";
      const q = Q.find(x => x.id === d.data.queryId);
      showTT(event, d.data.name,
        `<div style="color:${col(dom)};font-weight:800">${dom}</div>` +
        `<div style="color:#8899aa">Layer ${d.depth} · ${d.value} quer${d.value===1?"y":"ies"}</div>` +
        (q ? `<br><div style="color:#99aabb">${q.g2} › ${q.g3}</div>` : "")
      );
    })
    .on("mousemove", moveTT)
    .on("mouseout", function() { d3.select(this).attr("opacity",1); hideTT(); })
    .transition(tr)
    .attr("x", d => xPos(d, focus) + 1)
    .attr("y", d => yPos(d, focus) + 1)
    .attr("width", d => Math.max(0, xWid(d, focus) - 2))
    .attr("height", ROW - 2)
    .attr("rx", 3)
    .attr("fill", d => getColor(d))
    .attr("stroke", "#ffffff")
    .attr("stroke-width", 2)
    .attr("filter", d => d.depth - focus.depth < 3 ? "url(#shad)" : "none");

  // LABELS
  merged.select("text")
    .attr("pointer-events","none")
    .transition(tr)
    .attr("x", d => xPos(d, focus) + 10)
    .attr("y", d => yPos(d, focus) + ROW / 2)
    .attr("dominant-baseline","middle")
    .attr("fill","#ffffff")
    .attr("font-family","monospace")
    .attr("font-weight","900")
    .attr("font-size", d => {
      const w = xWid(d, focus);
      return Math.min(14, Math.max(9, w / 11)) + "px";
    })
    .text(d => {
      const w = xWid(d, focus);
      if (w < 28) return "";
      const max = Math.floor(w / 8);
      return d.data.name.length > max ? d.data.name.slice(0, max - 1) + "…" : d.data.name;
    });
}

// breadcrumb
function updateBC(node) {
  const crumbs = [];
  let n = node;
  while (n) { crumbs.unshift(n); n = n.parent; }

  const bcEl = document.getElementById("bc");
  bcEl.innerHTML = "";
  crumbs.forEach((c, i) => {
    if (i > 0) {
      const arr = document.createElement("span");
      arr.className = "bc-arrow"; arr.textContent = "›";
      bcEl.appendChild(arr);
    }
    const btn = document.createElement("div");
    btn.className = "bc" + (i === crumbs.length - 1 ? " active" : "");
    btn.textContent = c.data.name.length > 18 ? c.data.name.slice(0,17)+"…" : c.data.name;
    const dom = domainOf(c);
    if (dom && i === crumbs.length - 1) {
      btn.style.background = col(dom);
      btn.style.borderColor = col(dom);
      btn.style.color = "#fff";
    }
    btn.addEventListener("click", e => { e.stopPropagation(); zoom(c); });
    bcEl.appendChild(btn);
  });
}

zoom(hier);
</script>
</body>
</html>
